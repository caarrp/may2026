<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Graphing Calculator</title>

  <link id="theme-stylesheet" rel="stylesheet" href="static/css/style_light.css">
  </link>
  <script src="static/js/calculator.js"></script>
  <script src="static/js/widget.js"></script>

  <script src="static/js/user.js"></script>

 
</head>

<body>
  <div id="button-container">
    <button id="light-dark-button" class="top-button">light</button>
    <button id="view-button" class="top-button">isometric</button>
  </div>

  <div id="widget-container">
    <canvas id="webgl-canvas"></canvas>


  <div class="input-panel">
    <input id="input-eqn" type="text" placeholder="eqn here">
    <button id="go-button">go!</button>
  </div>
  
  <div id="error-message" style="color: red; margin: 10px 0; padding: 8px; display: none;"></div>

</body>

</html>
